<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arabica</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Naskh+Arabic&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }
  
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: #4B2E4C; /* 🔥 ungu utama */
      color: #F8F9FA;
    
      display: flex;
      justify-content: center;
      align-items: center;
    
      height: 100dvh;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    body.loaded {
      opacity: 1;
    }

    body.fade-out {
      opacity: 0;
    }
    
    .app {
      width: 100%;
      max-width: 600px;
      text-align: center;
      padding: 16px;
      transform: translateY(-5vh);
      opacity: 1;
      transition: opacity 0.3s ease;
    }
    
    .app.fade-out {
      opacity: 0;
    }
    
    .app.loaded .title::after {
      transform: scaleX(1);
    }
  
    .title {
      font-size: 34px;
      font-weight: 800;
      color: #F6C32E;
    
      text-align: center;
      margin-bottom: 30px;
      line-height: 1.2;
    
      letter-spacing: 0.5px;
      position: relative;
      display: inline-block;
    }
    
    /* 🔥 garis modern */
    .title::after {
      content: "";
      display: block;
      width: 75%;
      max-width: 100%;
      height: 4px;
      background: #F6C32E;
    
      margin: 10px auto 0;
      border-radius: 2px;
      opacity: 0.9;
      transform: scaleX(0.4);
      transform-origin: center;
      transition: 0.3s ease;
    }

    body.loaded .title::after {
      transform: scaleX(1);
    }

    @media (max-width: 480px) {
      .title {
        font-size: 28px;
      }
    }
  
    .card {
      background: #2E1B2F; /* 🔥 ungu gelap */
      padding: 30px 25px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      animation: pop 0.3s ease;
    }
  
    #question {
      font-size: 20px;
      margin: 20px 0 12px;
      font-weight: 600;
      color: #F8F9FA;
    }
  
    #answer {
      font-size: 32px;
      margin: 25px 0;
      color: #F6C32E; /* 🔥 kuning highlight */
      font-family: 'Noto Naskh Arabic', serif;
    }
  
    .answer-box {
      background: #4B2E4C;
      border-radius: 12px;
      padding: 15px;
      margin-top: 20px;
      border: none; /* 🔥 hilangkan */
    }
  
    .label {
      display: inline-block;
      padding: 4px 10px;
      font-size: 12px;
      background: #2E1B2F; /* 🔥 sama seperti card */
      color: #F8F9FA; /* 🔥 putih */
      border-radius: 999px;
      margin-top: 8px;
      margin-bottom: 15px;
    }
  
    .buttons {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
  
    button {
      position: relative;
      overflow: hidden;
    
      padding: 14px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
    
      transition: all 0.15s ease;
    }
  
    .generate {
      background: #F6C32E;
      color: #2E1B2F;
      box-shadow: 0 4px 0 #d4a91f;
    }
    
    .generate:hover {
      background: #e5b72a;
    }
    
    .generate:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #d4a91f;
    }
    
    .answer-btn {
      background: #4B2E4C;
      color: #F8F9FA;
      box-shadow: 0 4px 0 #2E1B2F;
    }
    
    .answer-btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #2E1B2F;
    }
  
    .footer {
      position: fixed;
      bottom: 16px;
      width: 100%;
      text-align: center;
      font-size: 12px;
      color: #F8F9FA;
      opacity: 0.5;
    }
  
    button::after {
      content: "";
      position: absolute;
      width: 100px;
      height: 100px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      transform: scale(0);
      opacity: 0;
      pointer-events: none;
    }
    
    .generate:hover,
    .answer-btn:hover {
      transform: translateY(-2px);
    }
  
    #questionWrap, #answerWrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .audio-icon {
      cursor: pointer;
      font-size: 18px;
      opacity: 0.7;
      transition: 0.2s;
    }
    
    .audio-icon:hover {
      opacity: 1;
      transform: scale(1.2);
    }

    .btn-main {
      padding: 14px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
    
      transition: all 0.15s ease;
    }

    .btn-main:hover {
      transform: translateY(-2px);
    }
    
    .btn-main:active {
      transform: translateY(2px);
    }

    .btn-back {
      width: 60px;
      height: 60px;
    
      border-radius: 16px;
      border: none;
      cursor: pointer;
    
      background: #2E1B2F;
      color: #F8F9FA;
    
      font-size: 24px;
    
      margin: 25px auto 0 auto;
    
      display: flex;
      justify-content: center;
      align-items: center;
    
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    
      transition: all 0.15s ease;
    }
    
    .btn-back:hover {
      transform: translateY(-2px);
    }
    
    .btn-back:active {
      transform: translateY(2px);
    }
  </style>
</head>

<body>

  <div class="app">
    <h1 class="title">Isim</h1>

    <div class="card">

      <!-- Soal -->
      <div id="questionWrap">
        <span class="audio-icon" onclick="playQuestion()">🔊</span>
        <span id="question">Klik "Buat Kalimat"</span>
      </div>

      <!-- Jawaban -->
      <div class="answer-box" id="answerWrap" style="display:none;">
        <span class="audio-icon" onclick="playAnswer()">🔊</span>
        <span id="answer"></span>
      </div>

      <!-- Label (tunggal, jamak, dll) -->
      <div id="label" class="label"></div>

      <!-- Tombol -->
      <div class="buttons">
        <button class="btn-main generate" onclick="generateSentence()">
          Buat Kalimat
        </button>
        
        <button class="btn-main answer-btn" onclick="showAnswer()">
          Lihat Jawaban
        </button>
      </div>

    </div>
    <button class="btn-back" onclick="go('menu.html')">
      ⬅️
    </button>
    
  </div>

  <div class="footer">
    Dibuat oleh Mahadhitia
  </div>

  <script src="data/isim.js"></script>
  <script src="data/fiil.js"></script>
  <script src="script.js"></script>
  <script>
    mode = "noun";
    buildPool();
  </script>

  <script>
  /* =========================
     🚀 NAVIGASI BACK (ONLY AUDIO)
  ========================= */
  function go(url) {
    const el = document.querySelector(".app");
  
    // 🔥 audio fresh (fix utama)
    const audio = new Audio("sound/click.mp3");
  
    audio.play()
      .then(() => {
        if (el) el.classList.add("fade-out");
  
        setTimeout(() => {
          window.location.replace(url);
        }, 500);
      })
      .catch(() => {
        if (el) el.classList.add("fade-out");
  
        setTimeout(() => {
          window.location.replace(url);
        }, 200);
      });
  }
  
  /* =========================
     🎬 LOAD ANIMATION
  ========================= */
  function showPage() {
    requestAnimationFrame(() => {
      document.body.classList.add("loaded");
    });
  }
  
  window.addEventListener("load", showPage);
  window.addEventListener("pageshow", showPage);
  </script>

</body>
</html>
